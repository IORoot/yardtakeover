<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SUPAXXL Yard Takeover – Challenge Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f9fafb;
      --bg-elevated: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --row-green: rgba(34, 197, 94, 0.12);
      --row-orange: rgba(249, 115, 22, 0.12);
      --row-red: rgba(248, 113, 113, 0.12);
      --row-blue: rgba(59, 130, 246, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      width: 100%;
      padding: 20px;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.6rem;
      margin: 0;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 0.95rem;
    }

    button {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 8px 14px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }

    button:hover {
      border-color: var(--accent);
      background: #eff6ff;
    }

    button.danger {
      border-color: #fecaca;
      color: #b91c1c;
      background: #fef2f2;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .badge {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .badge.green {
      background: #22c55e;
    }

    .badge.orange {
      background: #f97316;
    }

    .badge.red {
      background: #f87171;
    }

    .table-container {
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .table-scroll {
      width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 1rem;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #f3f4f6;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      text-align: left;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    tbody tr:nth-child(even) {
      background-color: #f9fafb;
    }

    tbody tr:nth-child(odd) {
      background-color: #ffffff;
    }

    tbody tr.status-green {
      background-color: var(--row-green) !important;
    }

    tbody tr.status-orange {
      background-color: var(--row-orange) !important;
    }

    tbody tr.status-red {
      background-color: var(--row-red) !important;
    }

    tbody tr.completed {
      background-color: var(--row-blue) !important;
    }

    tbody tr.completed .num-cell::before {
      content: "✓ ";
      color: #22c55e;
      font-size: 0.9rem;
    }

    .checkbox-cell {
      text-align: center;
      width: 56px;
    }

    .num-cell {
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .desc-cell {
      max-width: 260px;
      white-space: normal;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .image-thumb {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #d1d5db;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
      background: #f9fafb;
    }

    .image-thumb img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      padding: 3px 10px;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .pill.stick-yes {
      border-color: #fcd34d;
      color: #facc15;
    }

    .pill.stick-no {
      border-color: #4ade80;
      color: #4ade80;
    }

    .links-cell a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
      margin-right: 6px;
    }

    .links-cell a:hover {
      text-decoration: underline;
    }

    select.status-select {
      background: #ffffff;
      color: var(--text);
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 0.9rem;
    }

    .checkbox-cell input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .scroll-controls {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 50;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.2rem;
      }

      .subtitle {
        margin-top: 4px;
      }

      .table-container {
        border-radius: 12px;
      }
    }
  </style>
</head>

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveState(state) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch {
        // ignore quota errors on mobile
      }
    }

    function applyRowState(tr, challenge, stateForId) {
      const checkbox = tr.querySelector('input[type="checkbox"]');
      const select = tr.querySelector('select.status-select');

      const completed = !!(stateForId && stateForId.completed);
      const status = stateForId && stateForId.status || '';

      checkbox.checked = completed;
      select.value = status;

      tr.classList.remove('completed', 'status-green', 'status-orange', 'status-red');

      if (completed) {
        tr.classList.add('completed');
      } else {
        if (status === 'green') tr.classList.add('status-green');
        if (status === 'orange') tr.classList.add('status-orange');
        if (status === 'red') tr.classList.add('status-red');
      }
    }

    function renderTable(data, state) {
      const tbody = document.querySelector('#challenges-table tbody');
      tbody.innerHTML = '';

      const rank = (status) => {
        if (status === 'green') return 0;
        if (status === 'orange') return 1;
        if (status === 'red') return 2;
        return 3;
      };

      const sorted = [...data].sort((a, b) => {
        const saState = state[a.number] || {};
        const sbState = state[b.number] || {};

        const ca = saState.completed ? 1 : 0;
        const cb = sbState.completed ? 1 : 0;
        if (ca !== cb) return ca - cb; // completed (1) sorted after incomplete (0)

        const sa = saState.status || '';
        const sb = sbState.status || '';
        const ra = rank(sa);
        const rb = rank(sb);
        if (ra !== rb) return ra - rb;
        const na = parseInt(a.number, 10);
        const nb = parseInt(b.number, 10);
        if (!isNaN(na) && !isNaN(nb)) return na - nb;
        return (a.title || '').localeCompare(b.title || '');
      });

      sorted.forEach(ch => {
        const id = ch.number || ch.title;
        const tr = document.createElement('tr');
        tr.dataset.id = id;

        const tickCell = document.createElement('td');
        tickCell.className = 'checkbox-cell';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'complete-checkbox';
        checkbox.dataset.id = id;
        tickCell.appendChild(checkbox);

        const numCell = document.createElement('td');
        numCell.className = 'num-cell';
        numCell.textContent = ch.number;

        const imageCell = document.createElement('td');
        const imageWrapper = document.createElement('div');
        imageWrapper.className = 'image-thumb';
        const img = document.createElement('img');
        img.decoding = 'async';
        img.src = ch.image;
        img.alt = ch.title;
        imageWrapper.appendChild(img);
        imageCell.appendChild(imageWrapper);

        const descCell = document.createElement('td');
        descCell.className = 'desc-cell';
        descCell.textContent = ch.description;

        const stickCell = document.createElement('td');
        const stickPill = document.createElement('span');
        stickPill.className = 'pill';
        const stickLower = (ch.stickRequired || '').toLowerCase();
        if (stickLower.startsWith('yes')) {
          stickPill.classList.add('stick-yes');
          stickPill.textContent = 'Stick required';
        } else if (stickLower.startsWith('no')) {
          stickPill.classList.add('stick-no');
          stickPill.textContent = 'No stick required';
        } else {
          stickPill.textContent = ch.stickRequired || 'Unclear';
        }
        stickCell.appendChild(stickPill);

        const linksCell = document.createElement('td');
        linksCell.className = 'links-cell';
        if (ch.videoSample) {
          const aVideo = document.createElement('a');
          aVideo.href = ch.videoSample;
          aVideo.target = '_blank';
          aVideo.rel = 'noopener noreferrer';
          aVideo.textContent = 'Video sample';
          linksCell.appendChild(aVideo);
        }
        if (ch.challengeLink) {
          const aPage = document.createElement('a');
          aPage.href = ch.challengeLink;
          aPage.target = '_blank';
          aPage.rel = 'noopener noreferrer';
          aPage.textContent = 'Challenge page';
          linksCell.appendChild(aPage);
        }

        const statusCell = document.createElement('td');
        const select = document.createElement('select');
        select.className = 'status-select';
        select.dataset.id = id;
        select.innerHTML = `
          <option value="">–</option>
          <option value="green">Green</option>
          <option value="orange">Orange</option>
          <option value="red">Red</option>
        `;
        statusCell.appendChild(select);

        tr.appendChild(tickCell);
        tr.appendChild(numCell);
        tr.appendChild(imageCell);
        tr.appendChild(descCell);
        tr.appendChild(stickCell);
        tr.appendChild(linksCell);
        tr.appendChild(statusCell);

        tbody.appendChild(tr);

        applyRowState(tr, ch, state[id]);
      });
    }

    async function loadData() {
      try {
        const res = await fetch('challenges_data.json', { cache: 'no-store' });
        if (res.ok) {
          return await res.json();
        }
      } catch {
        // fall through to inline data
      }
      return CHALLENGES_DATA;
    }

    async function init() {
      const [data, state] = await Promise.all([loadData(), loadState()]);
      renderTable(data, state);

      const tbody = document.querySelector('#challenges-table tbody');

      tbody.addEventListener('change', (e) => {
        const target = e.target;
        const id = target.dataset.id;
        if (!id) return;

        const state = loadState();
        const rowState = state[id] || {};
        const tr = tbody.querySelector(`tr[data-id=\"${CSS.escape(id)}\"]`);

        if (target.matches('.complete-checkbox')) {
          rowState.completed = target.checked;
        }

        if (target.matches('.status-select')) {
          rowState.status = target.value;
        }

        state[id] = rowState;
        saveState(state);
        renderTable(data, state);
      });

      document.getElementById('clear-completed').addEventListener('click', () => {
        const state = loadState();
        Object.values(state).forEach(s => { s.completed = false; });
        saveState(state);
        document.querySelectorAll('.complete-checkbox').forEach(cb => {
          cb.checked = false;
        });
        document.querySelectorAll('#challenges-table tbody tr').forEach(tr => {
          tr.classList.remove('completed');
        });
      });

      document.getElementById('clear-status').addEventListener('click', () => {
        const state = loadState();
        Object.values(state).forEach(s => { s.status = ''; });
        saveState(state);
        document.querySelectorAll('.status-select').forEach(sel => sel.value = '');
        document.querySelectorAll('#challenges-table tbody tr').forEach(tr => {
          tr.classList.remove('status-green', 'status-orange', 'status-red');
        });
      });

      document.getElementById('clear-all').addEventListener('click', () => {
        if (!confirm('Reset all progress and colours on this device?')) return;
        localStorage.removeItem(STORAGE_KEY);
        document.querySelectorAll('.complete-checkbox').forEach(cb => {
          cb.checked = false;
        });
        document.querySelectorAll('.status-select').forEach(sel => sel.value = '');
        document.querySelectorAll('#challenges-table tbody tr').forEach(tr => {
          tr.classList.remove('completed', 'status-green', 'status-orange', 'status-red');
        });
      });

      const topBtn = document.getElementById('scroll-top-btn');
      const bottomBtn = document.getElementById('scroll-bottom-btn');

      topBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      bottomBtn.addEventListener('click', () => {
        window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
      });
    }

    init().catch(err => {
      console.error(err);
      alert('Failed to load challenges. Make sure challenges_data.json is next to this HTML file.');
    });
  </script>
</body>
</html>
